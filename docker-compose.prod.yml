services:
  postgres:
    environment:
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
    ports: []

  ovtl-core:
    image: ghcr.io/ovtl/ovtl-core:latest
    environment:
      ENVIRONMENT: production
      DATABASE_URL: "postgresql://ovtl:${POSTGRES_PASSWORD}@postgres:5432/ovtl?sslmode=prefer"
      JWT_SECRET: "${JWT_SECRET}"
      MASTER_ENCRYPTION_KEY: "${MASTER_ENCRYPTION_KEY}"
      TENANT_WRAP_KEY: "${TENANT_WRAP_KEY}"
      CORS_ALLOWED_ORIGINS: "${CORS_ALLOWED_ORIGINS}"
    restart: always
    read_only: true
    tmpfs:
      - /tmp
    command: ["./ovtl-core", "--migrate"]
